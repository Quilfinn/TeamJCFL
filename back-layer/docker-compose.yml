services:
  db:
    image: mysql:5.7
    platform: linux/x86_64
    restart: always
    environment:
      TZ: Europe/Zurich
      MYSQL_DATABASE: 'data'
      MYSQL_USER: 'user'
      MYSQL_PASSWORD: 'MgZhGMu9BXqdodhC49iMhfGZjJVXtRuk'
      MYSQL_ROOT_PASSWORD: 'qVNDLwAUbpJS7DP9N8RSfhdnCM2DBpW5'
    ports:
      - '3306:3306'
    expose:
      - '3306'
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u root --password=qVNDLwAUbpJS7DP9N8RSfhdnCM2DBpW5
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

  backend:
    image: team-jcfl/backend
    restart: always
    build:
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8484:8484'
    expose:
      - '8484'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8484/api/v1/health"]
      start_period: 5s
      interval: 2s
      timeout: 2s
      retries: 5
    environment:
      - FRONTEND_URL=http://localhost:3000

volumes:
  db_data: